# ========================
# PRODUCTION CONFIG
# ========================
# All values come from environment variables set in Railway.
# NEVER hardcode secrets here.

# ========================
# DATABASE (Railway provides this)
# ========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.open-in-view=false
spring.liquibase.enabled=false

# ========================
# REDIS (Railway provides this)
# ========================
spring.data.redis.url=${REDIS_URL}

# ========================
# JWT
# ========================
jwt.issuer=togetherly.com
jwt.cookie.domain=${COOKIE_DOMAIN}
jwt.access.token.lifetime=900
jwt.refresh.token.lifetime=1800

# ========================
# DEFAULT ADMIN
# ========================
default.admin.username=${ADMIN_USERNAME:admin}
default.admin.password=${ADMIN_PASSWORD}
default.admin.email=${ADMIN_EMAIL:admin@togetherly.com}

# ========================
# CORS (your Vercel frontend URL)
# ========================
allow.host=${CORS_ORIGIN}

# ========================
# PASSWORD RESET
# ========================
reset.password.url=${FRONTEND_URL}/reset-password?token=

# ========================
# LOGIN RATE LIMITING
# ========================
login.maxAttempts=5
login.attempts.coolTime=900

# ========================
# EMAIL (SMTP)
# ========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
media.upload.dir=uploads

# ========================
# SERVER
# ========================
server.port=${PORT:8080}
