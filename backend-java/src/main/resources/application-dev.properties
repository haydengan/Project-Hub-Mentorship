# ========================
# DATABASE (PostgreSQL)
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/togetherly
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AUTO DDL: Hibernate auto-creates/updates tables from entities.
# In production, you'd use Liquibase migrations instead (hbm2ddl.auto=none).
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.open-in-view=false

# Disable Liquibase for dev (using hbm2ddl.auto=update instead).
# Enable this and set hbm2ddl.auto=none when you're ready for proper migrations.
spring.liquibase.enabled=false

# ========================
# REDIS
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ========================
# JWT
# ========================
jwt.issuer=togetherly.com
# Domain for access/refresh cookies (for /web/api/ endpoints)
jwt.cookie.domain=localhost
# Token lifetimes in seconds (15 min access, 30 min refresh)
jwt.access.token.lifetime=900
jwt.refresh.token.lifetime=1800
# RSA keys are in application-dev.yml (YAML handles multiline better)

# ========================
# DEFAULT ADMIN
# ========================
default.admin.username=admin
default.admin.password=pa55ward
default.admin.email=admin@togetherly.com

# ========================
# CORS
# ========================
# Allow frontend on any localhost port
allow.host=http://localhost:[*]

# ========================
# PASSWORD RESET
# ========================
reset.password.url=http://localhost:5173/reset-password?token=

# ========================
# LOGIN RATE LIMITING
# ========================
login.maxAttempts=5
# Cooldown in seconds (15 min)
login.attempts.coolTime=900

